<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信不信我用5个问题就能知道你的名字</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#0d1117;--card:#161b22;--accent:#58a6ff;--accent2:#7c3aed;
    --red:#f85149;--green:#3fb950;--text:#e6edf3;--muted:#8b949e;
    --border:#30363d;
  }

  body{
    font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:20px;
    background-image:
      radial-gradient(ellipse at 20% 20%,rgba(88,166,255,0.04) 0%,transparent 55%),
      radial-gradient(ellipse at 80% 80%,rgba(124,58,237,0.04) 0%,transparent 55%);
  }
  .container{width:100%;max-width:560px;position:relative}
  .page{display:none;animation:fadeIn .4s ease}
  .page.active{display:block}

  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,1px)}80%{transform:translate(1px,-1px)}}
  @keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
  @keyframes lockBounce{0%{transform:scale(0) rotate(-10deg)}50%{transform:scale(1.25) rotate(4deg)}70%{transform:scale(.9) rotate(-2deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes scanLine{0%{top:0}100%{top:100%}}
  @keyframes collapseOut{
    0%{opacity:1;max-width:120px;padding:5px 10px;margin:3px;border-width:1.5px;font-size:13px}
    20%{opacity:.8}
    100%{opacity:0;max-width:0;padding:0 0;margin:0 0;border-width:0;font-size:0;min-width:0}
  }

  /* ── Landing ── */
  .landing{text-align:center;padding:24px 0}
  .landing .icon{font-size:56px;display:block;animation:float 3s ease-in-out infinite}
  .landing .badge{display:inline-block;padding:5px 14px;border-radius:20px;background:rgba(88,166,255,.12);color:var(--accent);font-size:12px;font-weight:600;margin-bottom:14px}
  .landing h1{font-size:28px;font-weight:900;line-height:1.4;margin-bottom:6px}
  .landing h1 .hl{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .landing .sub{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:24px}
  .landing .features{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:28px}
  .landing .feat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--muted);text-align:center;min-width:100px;flex:1}
  .landing .feat span{display:block;font-size:22px;margin-bottom:4px}

  .btn{display:inline-block;padding:14px 44px;border-radius:50px;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:all .25s;font-family:inherit}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 24px rgba(88,166,255,.25)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(88,166,255,.4)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--muted)}

  /* ── Quiz ── */
  .quiz-header{margin-bottom:20px}
  .steps{display:flex;gap:6px;margin-bottom:12px}
  .step{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
  .step.done{background:var(--accent)}.step.current{background:var(--accent2)}
  .q-badge{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:6px}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px 28px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
  .q-title{font-size:19px;font-weight:700;line-height:1.6;margin-bottom:22px}
  .options{display:flex;flex-direction:column;gap:10px}
  .option{display:flex;align-items:center;gap:12px;padding:15px 18px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .2s;font-size:15px;line-height:1.5;text-align:left;width:100%;font-family:inherit;color:var(--text)}
  .option:hover{border-color:var(--accent);background:rgba(88,166,255,.04)}
  .option.selected{border-color:var(--accent);background:rgba(88,166,255,.08)}
  .option .dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .2s}
  .option.selected .dot{border-color:var(--accent);background:var(--accent)}
  .quiz-nav{margin-top:18px;display:flex;justify-content:flex-end}

  /* ── Analyzing ── */
  .analyzing{text-align:center;padding:60px 20px}
  .analyzing .spinner{width:56px;height:56px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 24px}
  .analyzing h3{font-size:18px;margin-bottom:12px}
  .analyzing .log{font-size:14px;color:var(--muted);line-height:2.2;display:flex;flex-direction:column;align-items:center;gap:2px}
  .analyzing .log span{display:block;animation:fadeIn .3s ease}

  /* ═══════════ DATABASE PAGE — full-screen scrolling ═══════════ */
  .db-page{overflow:hidden}
  .db-header{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(180deg,var(--bg) 60%,transparent);
    padding:16px 0 10px;text-align:center;
  }
  .db-header .stage-label{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px;margin-bottom:4px}
  .db-header .info-line{font-size:14px;color:var(--muted)}
  .db-header .info-line .count{color:var(--text);font-weight:700}
  .db-header .info-line .hi{color:var(--red)}
  .db-header .info-line .lo{color:var(--green)}

  .scan-overlay{
    position:absolute;left:0;right:0;height:40px;z-index:5;
    background:linear-gradient(180deg,transparent,rgba(88,166,255,.12),transparent);
    animation:scanLine 1.8s linear infinite;pointer-events:none;border-radius:4px;
  }

  .name-grid-db{
    display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
    padding:10px 8px 40px;position:relative;
    max-height:60vh;overflow-y:auto;
    mask-image:linear-gradient(to bottom,transparent 0%,#000 8%,#000 92%,transparent 100%);
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,#000 8%,#000 92%,transparent 100%);
  }
  .name-pill{
    padding:5px 10px;border-radius:14px;font-size:13px;font-weight:500;
    background:var(--card);border:1.5px solid var(--border);color:var(--muted);
    transition:all .2s;white-space:nowrap;display:inline-block;
    overflow:hidden;max-width:120px;min-width:0;
  }
  .name-pill.flash{background:rgba(88,166,255,.1);border-color:var(--accent);color:var(--text)}
  .name-pill.eliminated{
    animation:collapseOut .3s ease-in forwards;
    pointer-events:none;
  }
  .name-pill.survivor{
    background:rgba(63,185,80,.15);border-color:var(--green);color:var(--green);
    font-size:16px;font-weight:900;padding:8px 18px;
    z-index:20;box-shadow:0 0 24px rgba(63,185,80,.3);
    animation:popIn .5s ease;
  }
  .name-pill.target-final{
    background:rgba(63,185,80,.2);border-color:var(--green);color:var(--green);
    font-size:28px;font-weight:900;padding:14px 32px;
    z-index:30;box-shadow:0 0 50px rgba(63,185,80,.6),0 0 100px rgba(63,185,80,.2);
    animation:survivorPulse 1.5s ease-in-out infinite;
    transition:all .6s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes survivorPulse{
    0%,100%{box-shadow:0 0 50px rgba(63,185,80,.6),0 0 100px rgba(63,185,80,.2)}
    50%{box-shadow:0 0 80px rgba(63,185,80,.9),0 0 160px rgba(63,185,80,.4)}
  }

  .reveal-overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(13,17,23,.92);z-index:50;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .reveal-overlay .char-row{display:flex;gap:16px;align-items:center;margin-bottom:10px}
  .reveal-overlay .big-char{
    font-size:72px;font-weight:900;opacity:0;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .reveal-overlay .locked-badge{
    padding:8px 20px;border-radius:8px;
    background:rgba(63,185,80,.12);border:1.5px solid var(--green);
    color:var(--green);font-size:18px;font-weight:900;letter-spacing:2px;
    animation:lockBounce .6s ease;margin-top:8px;opacity:0;
  }
  .reveal-overlay .locked-sub{font-size:12px;color:var(--muted);margin-top:6px;opacity:0}

  /* ── Result ── */
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:36px 28px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.3)}
  .result-card .reveal-label{font-size:14px;color:var(--muted);margin-bottom:14px}
  .result-card .the-name{font-size:48px;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glitch .3s ease 2}
  .result-card .analysis{text-align:left;background:var(--bg);border-radius:12px;padding:20px;margin:16px 0;font-size:14px;line-height:1.8}
  .result-card .analysis .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
  .result-card .analysis .row:last-child{border-bottom:none}
  .result-card .analysis .label{color:var(--muted)}
  .result-card .analysis .val{color:var(--text);font-weight:600}
  .conf-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
  .conf-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px}
  .result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px}

  @media(max-width:480px){
    .landing h1{font-size:22px}
    .result-card .the-name{font-size:36px}
    .q-title{font-size:17px}
    .q-card,.result-card{padding:24px 18px}
    .reveal-overlay .big-char{font-size:52px}
    .name-pill{font-size:12px;padding:4px 8px}
    .name-pill.target-final{font-size:22px;padding:10px 22px}
  }
</style>
</head>

<div class="container">

  <!-- ═══════ LANDING ═══════ -->

        <div class="conf-bar"><div class="conf-fill" style="width:0%;background:var(--green)" id="b4"></div></div>

      <div class="result-actions">

        <button class="btn btn-ghost" onclick="shareResult()">📤 发给朋友试试</button>
      </div>
    </div>
  </div>

  <!-- ═══════ REVEAL OVERLAY (inside db page) ═══════ -->
  <div class="reveal-overlay" id="reveal-overlay" style="display:none">

</div>

  '琪','欣','瑜','艺','馨','怡','月','晓','若','灵','曼','素','秋','春','夏','冬','露','霜','冰','清',
  '雅','纯','真','善','美','妙','婉','柔','淑','娴','姿','容','仪','姣','婵','娟','娇','娥','妃','姬',
  '如','意','心','爱','思','念','忆','盼','望','期','梦','幻','烟','波','涛','澜','涟','漪','沫','浅',
  '宁','安','平','和','悦','乐','欢','喜','嘉','佑','瑞','祥','福','禄','寿','康','健','吉','庆','贺',
  '之','以','然','尔','兮','若','其','为','可','能','非','无','有','在','于','与','从','因','由','自',
  '初','元','启','承','继','绍','续','延','永','长','久','恒','常','时','新','鲜','生','活','润','泽',
];

const TARGET = '谢忱';
const RENDER_COUNT = 500;           // Actually rendered pills
const FAKE_TOTAL = 24354255;        // The BIG number shown on screen

function generateNames(count) {
  const names = new Set();
  names.add(TARGET); // Ensure target is in the pool

  while (names.size < count) {
    const surname = SURNAMES[Math.floor(Math.random() * SURNAMES.length)];
    // Mix male and female given names for variety
    const pool = Math.random() < 0.5 ? GIVEN_M : GIVEN_F;
    const g1 = pool[Math.floor(Math.random() * pool.length)];
    // ~30% chance of single-character given name
    let given;
    if (Math.random() < 0.3) {
      given = g1;
    } else {
      const g2 = pool[Math.floor(Math.random() * pool.length)];
      given = g1 + g2;
    }
    const full = surname + given;
    // Filter out names that are too short/long or weird
    if (full.length >= 2 && full.length <= 4) {
      names.add(full);
    }
  }

  // Remove target from set, we'll insert it at a specific position
  names.delete(TARGET);
  const arr = [...names];
  // Shuffle
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  // Insert target at a random position (not too early, not too late — middle-ish)
  const targetPos = Math.floor(arr.length * 0.3) + Math.floor(Math.random() * arr.length * 0.4);
  arr.splice(targetPos, 0, TARGET);
  return { names: arr, targetIdx: targetPos };
}

// ═══════════════ QUIZ LOGIC ═══════════════
let currentQ = 0;

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('reveal-overlay').style.display = 'none';
  const pg = document.getElementById('page-'+id);
  if(pg) pg.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQuiz(){currentQ=0;showPage('quiz');renderQuestion()}

function renderQuestion(){
  const q=questions[currentQ];
  document.getElementById('q-badge').textContent=`问题 ${currentQ+1} / ${questions.length}`;
  document.getElementById('q-title').textContent=q.q;
  document.getElementById('steps').innerHTML=questions.map((_,i)=>{
    let cls='step';if(i<currentQ)cls+=' done';if(i===currentQ)cls+=' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('q-options').innerHTML=q.opts.map((opt,i)=>`
    <button class="option" onclick="selectOption(${i})" id="opt-${i}">
      <span class="dot"></span><span>${opt}</span>
    </button>
  `).join('');
  if(window['_sel'+currentQ]!==undefined) highlightOpt(window['_sel'+currentQ]);
  const btn=document.getElementById('btn-next');
  if(currentQ===questions.length-1){btn.textContent='🔮 计算我的名字';btn.onclick=startAnalyzing}
  else{btn.textContent='下一题 →';btn.onclick=nextQuestion}
}
function highlightOpt(idx){document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));const el=document.getElementById('opt-'+idx);if(el)el.classList.add('selected')}
function selectOption(idx){window['_sel'+currentQ]=idx;highlightOpt(idx)}
function nextQuestion(){if(window['_sel'+currentQ]===undefined)return;if(currentQ<questions.length-1){currentQ++;renderQuestion()}}

// ═══════════════ ANALYZING ═══════════════
function startAnalyzing(){
  if(window['_sel'+currentQ]===undefined)return;
  showPage('analyzing');
  const log=document.getElementById('analyze-log');
  const fakeTotalWan = (FAKE_TOTAL / 10000).toFixed(0);
  const msgs=['🧬 提取选择特征向量……','🔢 匹配笔画分布模型……','🗣️ 音韵频率分析中……',`📊 对比 ${fakeTotalWan} 万组姓名数据……`,'🎯 锁定唯一匹配……'];
  log.innerHTML='';
  let i=0;
  const iv=setInterval(()=>{
    if(i<msgs.length){
      const span=document.createElement('span');
      span.textContent=msgs[i];
      if(i===msgs.length-1) span.style.color='var(--green)';
      log.appendChild(span);i++;
    }else{clearInterval(iv);setTimeout(startDatabaseLottery,400)}
  },500);
}

// ═══════════════ DATABASE LOTTERY — THE BIG SHOW ═══════════════
let _dbData = null;

function startDatabaseLottery(){
  showPage('db');
  document.getElementById('reveal-overlay').style.display = 'none';

  _dbData = generateNames(RENDER_COUNT);
  const { names } = _dbData;

  const grid = document.getElementById('name-grid-db');
  grid.innerHTML = names.map((n, i) =>
    `<span class="name-pill" id="pill-${i}" data-name="${n}">${n}</span>`
  ).join('');

  document.getElementById('stage-label').textContent = '🔍 正在连接姓名数据库……';
  document.getElementById('info-line').innerHTML = `数据库共 <span class="count">${FAKE_TOTAL.toLocaleString()}</span> 条记录 — 正在扫描匹配……`;
  document.getElementById('scan-overlay').style.display = 'block';

  // scroll to a random position to look "live"
  setTimeout(() => {
    grid.scrollTop = Math.random() * (grid.scrollHeight - grid.clientHeight);
  }, 300);

  // Phase 1: Flashing scan — rows of pills light up
  flashScanPhase(names, () => {
    // Phase 2: Elimination
    eliminatePhase(names, () => {
      // Phase 3: Reveal
      revealTargetPhase();
    });
  });
}

function flashScanPhase(names, done) {
  const grid = document.getElementById('name-grid-db');
  const totalPills = names.length;
  let scanned = 0;
  let fakeScanned = 0;
  const batchSize = 40;
  const fakePerBatch = Math.floor(FAKE_TOTAL / (totalPills / batchSize)); // spread fake total across batches

  const iv = setInterval(() => {
    // Flash a batch
    for (let i = 0; i < batchSize && scanned < totalPills; i++, scanned++) {
      const pill = document.getElementById('pill-' + scanned);
      if (pill) pill.classList.add('flash');
    }
    // Un-flash previous batch
    const prevStart = scanned - batchSize * 2;
    for (let i = Math.max(0, prevStart); i < Math.max(0, scanned - batchSize); i++) {
      const pill = document.getElementById('pill-' + i);
      if (pill) pill.classList.remove('flash');
    }
    // Scroll faster
    grid.scrollTop += 8;

    fakeScanned = Math.min(Math.floor(scanned / totalPills * FAKE_TOTAL), FAKE_TOTAL);
    document.getElementById('info-line').innerHTML =
      `已扫描 <span class="count">${fakeScanned.toLocaleString()}</span> / ${FAKE_TOTAL.toLocaleString()} 条记录……`;

    if (scanned >= totalPills) {
      clearInterval(iv);
      // Clear remaining flashes
      document.querySelectorAll('.name-pill.flash').forEach(p => p.classList.remove('flash'));
      document.getElementById('info-line').innerHTML =
        `扫描完成！<span class="count">${FAKE_TOTAL.toLocaleString()}</span> 条记录全部过了一遍`;
      document.getElementById('scan-overlay').style.display = 'none';
      document.getElementById('stage-label').textContent = '✂️ 正在排除不匹配项……';
      setTimeout(done, 300);
    }
  }, 25);
}

function eliminatePhase(names, done) {
  const targetIdx = _dbData.targetIdx;
  const grid = document.getElementById('name-grid-db');

  const toElim = names.map((_, i) => i).filter(i => i !== targetIdx);
  for (let i = toElim.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [toElim[i], toElim[j]] = [toElim[j], toElim[i]];
  }

  let elimCount = 0;
  const batchSize = 20;
  let fakeEliminated = 0;
  let fakeRemaining = FAKE_TOTAL;

  const iv = setInterval(() => {
    const batch = toElim.slice(elimCount, elimCount + batchSize);
    if (batch.length === 0) {
      clearInterval(iv);
      document.getElementById('info-line').innerHTML =
        `已排除 <span class="hi">${(FAKE_TOTAL - 1).toLocaleString()}</span> 条 · 剩余 <span class="lo">1</span> 条匹配`;
      // Remove all eliminated pills from DOM so survivor naturally centers in flex
      document.querySelectorAll('.name-pill.eliminated').forEach(p => p.remove());
      const survivorPill = document.getElementById('pill-' + targetIdx);
      if (survivorPill) {
        survivorPill.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      setTimeout(done, 500);
      return;
    }

    batch.forEach(idx => {
      const pill = document.getElementById('pill-' + idx);
      if (pill) pill.classList.add('eliminated');
    });

    elimCount += batch.length;
    fakeEliminated = Math.floor(elimCount / toElim.length * (FAKE_TOTAL - 1));
    fakeRemaining = FAKE_TOTAL - fakeEliminated;

    document.getElementById('info-line').innerHTML =
      `已排除 <span class="hi">${fakeEliminated.toLocaleString()}</span> 条 · 剩余 <span class="lo">${fakeRemaining.toLocaleString()}</span> 条`;
  }, 60);
}

function revealTargetPhase(){
  const targetIdx = _dbData.targetIdx;
  document.getElementById('stage-label').textContent = '🎯 唯一匹配项锁定';
  document.getElementById('info-line').innerHTML = '';

  const survivor = document.getElementById('pill-' + targetIdx);
  if (survivor) {
    survivor.classList.add('survivor');
    // After a brief pause, the survivor zooms up big
    setTimeout(() => {
      survivor.classList.add('target-final');
      survivor.classList.remove('survivor');
      // Scroll to center on the survivor
      survivor.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 600);
  }

  // Let the spectator savor the moment — one green name alone on screen
  setTimeout(() => { showRevealOverlay(); }, 1800);
}

function showRevealOverlay(){
  const overlay = document.getElementById('reveal-overlay');
  overlay.style.display = 'flex';

  // Reveal first character
  setTimeout(() => {
    const c1 = document.getElementById('big-char-1');
    if (c1) { c1.style.opacity = '1'; c1.style.animation = 'popIn .5s ease'; }
  }, 400);

  // Reveal second character
  setTimeout(() => {
    const c2 = document.getElementById('big-char-2');
    if (c2) { c2.style.opacity = '1'; c2.style.animation = 'popIn .5s ease'; }
  }, 900);

  // Locked badge
  setTimeout(() => {
    const badge = document.getElementById('locked-badge');
    const sub = document.getElementById('locked-sub');
    if (badge) badge.style.opacity = '1';
    if (sub) sub.style.opacity = '1';
  }, 1400);

  // Transition to final result
  setTimeout(() => { showFinalResult(); }, 2600);
}

// ═══════════════ FINAL RESULT ═══════════════
function showFinalResult(){
  document.getElementById('reveal-overlay').style.display = 'none';
  showPage('result');
  document.getElementById('the-name').textContent = TARGET;

  const bars = [
    {el:document.getElementById('b1'),txt:document.getElementById('r1'),v:98.4,label:'98.4% — 极高'},
    {el:document.getElementById('b2'),txt:document.getElementById('r2'),v:96.1,label:'96.1% — 极高'},
    {el:document.getElementById('b3'),txt:document.getElementById('r3'),v:99.2,label:'99.2% — 极高'},
    {el:document.getElementById('b4'),txt:document.getElementById('r4'),v:99.7,label:'99.7% — 锁定'},
  ];
  bars.forEach((b,i)=>{
    setTimeout(()=>{b.el.style.width=b.v+'%';b.txt.textContent=b.label},300*(i+1));
  });
}

function restartQuiz(){
  for(let i=0;i<questions.length;i++) delete window['_sel'+i];
  _dbData = null;
  currentQ=0;startQuiz();
}
function shareResult(){
  const text='🤯 一个网站号称用5个问题就能猜出我的名字……结果它真的猜对了……\n\n你也来试试：';
  if(navigator.share){navigator.share({title:'信不信我用5个问题就能知道你的名字',text})}
  else{navigator.clipboard.writeText(text).then(()=>alert('已复制，去发给朋友吧！🤯'))}
}
